# Casbin RBAC Model Configuration for Harmoni
# Territory-aware RBAC with domain isolation

[request_definition]
r = sub, obj, act, dom

# sub = subject (user role)
# obj = object (resource type)
# act = action (read, write)
# dom = domain (territory_id)

[policy_definition]
p = sub, obj, act, dom

# Policy: role, resource, action, territory_domain

[role_definition]
g = _, _

# g, role1, role2 means role1 inherits role2's permissions
# Role hierarchy: rw_officer → rt_officer → resident

[policy_effect]
e = some(where (p.eft == allow))

# Allow if any matching policy rule exists

[matchers]
m = g(r.sub, p.sub) && r.obj == p.obj && r.act == p.act && (r.dom == p.dom || p.dom == "*")

# Matcher logic:
# 1. g(r.sub, p.sub) — role inheritance check (e.g., rw_officer matches rt_officer policy)
# 2. r.obj == p.obj — resource type must match
# 3. r.act == p.act — action must match
# 4. r.dom == p.dom || p.dom == "*" — territory must match OR policy uses wildcard
